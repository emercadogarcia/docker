version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      # Sincroniza tu código fuente
      - /home/emercado/emercado_data/Cursos/2026/web-IA:/workspaces:cached
      # Persistencia de Sesiones de IA (Para no loguearte cada vez)
      - /home/emercado/emercado_data/.config/gcloud:/home/vscode/.config/gcloud
      - /home/emercado/emercado_data/.config/gh:/home/vscode/.config/gh
      - /home/emercado/emercado_data/.aider:/home/vscode/.aider
    environment:
      - NODE_VERSION=20
    networks:
      - dev-network
    command: sleep infinity

  mysql:
    image: mysql:8.4
    ports:
      - "3306:3306"
    environment:
      - MYSQL_DATABASE=laravel
      - MYSQL_ROOT_PASSWORD=root
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - dev-network

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=laravel
      - POSTGRES_PASSWORD=root
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - dev-network

  redis:
    image: redis:7-alpine
    networks:
      - dev-network

networks:
  dev-network:
    driver: bridge

volumes:
  mysql_data:
  postgres_data: